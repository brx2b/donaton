name: CI/CD Frontend - React

on:
  push:
    branches: [ "main" ]
    paths:
      - "frontend/**"

jobs:
  build-push-deploy-frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login a Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build y Push Frontend a ECR
        run: |
          cd frontend
          docker build -t frontend-app .
          docker tag frontend-app:latest ${{ secrets.ECR_REPO_FRONTEND }}:latest
          docker push ${{ secrets.ECR_REPO_FRONTEND }}:latest

      - name: Desplegar en EC2 vía SSM
        run: |
          aws ssm send-command \
            --instance-ids ${{ secrets.EC2_INSTANCE_ID }} \
            --document-name "AWS-RunShellScript" \
            --comment "Actualizar Frontend" \
            --parameters '{"commands":[
              "set -e",
              "aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}",
              "docker pull ${{ secrets.ECR_REPO_FRONTEND }}:latest",
              "docker stop frontend || true",
              "docker rm frontend || true",
              "docker run -d --name frontend -p 3000:80 ${{ secrets.ECR_REPO_FRONTEND }}:latest"
            ]}' \
            --output text
