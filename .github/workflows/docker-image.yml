name: CI/CD Frontend - Donaton

on:
  push:
    branches: [ "main", "master" ]
    paths:
      - "frontend/**"
  workflow_dispatch:

jobs:
  build-push-deploy-frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS (Academy)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login a Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build y Push Frontend a ECR
        env:
          ECR_FULL_URL: ${{ secrets.ECR_REGISTRY }} 
        run: |
          echo "Usando URL completa: $ECR_FULL_URL"
          
          echo "Construyendo imagen..."
          docker build -t $ECR_FULL_URL:latest .
          
          echo "Subiendo a ECR..."
          docker push $ECR_FULL_URL:latest
          
          echo "Imagen subida correctamente: $ECR_FULL_URL:latest"

      - name: Desplegar Frontend en EC2 vía SSM
        env:
          ECR_FULL_URL: ${{ secrets.ECR_REGISTRY }} 
          IMAGE_NAME: frontenddonaton
        run: |
          FULL_IMAGE="${ECR_FULL_URL}/${IMAGE_NAME}:latest"
          
          echo "Enviando comando de despliegue a EC2..."
          echo "Imagen: $FULL_IMAGE"
          
          aws ssm send-command \
            --instance-ids ${{ secrets.EC2_FRONTEND_INSTANCE_ID }} \
            --document-name "AWS-RunShellScript" \
            --comment "Actualizar Frontend Donaton" \
            --parameters '{"commands":[
              "set -e",
              "echo \"$(date) - Iniciando despliegue\" >> /home/ubuntu/deploy.log",
              "cd /home/ubuntu/frontend || true",
              "aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}",
              "docker pull '"$FULL_IMAGE"'",
              "docker stop frontdonaton || true",
              "docker rm frontdonaton || true",
              "docker run -d --name frontdonaton -p 80:80 '"$FULL_IMAGE"'",
              "echo \"$(date) - Frontend actualizado correctamente con $FULL_IMAGE\" >> /home/ubuntu/deploy.log",
              "docker ps | grep frontdonaton"
            ]}' \
            --output text
